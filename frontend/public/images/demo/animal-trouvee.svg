<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="400" fill="#E8F5E9"/>
  
  <!-- Check badge -->
  <circle cx="340" cy="60" r="40" fill="#22C55E"/>
  <text x="345" y="75" text-anchor="middle" font-size="40" font-weight="bold" fill="white">✓</text>
  
  <!-- Ears -->
  <ellipse cx="160" cy="80" rx="20" ry="35" fill="#D4AF37"/>
  <ellipse cx="240" cy="80" rx="20" ry="35" fill="#D4AF37"/>
  <ellipse cx="160" cy="90" rx="12" ry="22" fill="#FFD700"/>
  <ellipse cx="240" cy="90" rx="12" ry="22" fill="#FFD700"/>
  
  <!-- Head -->
  <circle cx="200" cy="130" r="55" fill="#F4A460"/>
  
  <!-- Snout -->
  <ellipse cx="200" cy="155" rx="30" ry="35" fill="#DAA520"/>
  
  <!-- Eyes -->
  <circle cx="180" cy="115" r="8" fill="#000"/>
  <circle cx="220" cy="115" r="8" fill="#000"/>
  <circle cx="182" cy="112" r="3" fill="#fff"/>
  <circle cx="222" cy="112" r="3" fill="#fff"/>
  
  <!-- Happy eyes -->
  <path d="M 175 120 Q 180 125 185 120" stroke="#000" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 215 120 Q 220 125 225 120" stroke="#000" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Nose -->
  <ellipse cx="200" cy="160" rx="10" ry="8" fill="#000"/>
  
  <!-- Mouth (happy) -->
  <path d="M 195 170 Q 200 175 205 170" stroke="#000" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Body -->
  <ellipse cx="200" cy="220" rx="50" ry="60" fill="#DAA520"/>
  
  <!-- Front legs -->
  <rect x="170" y="270" width="18" height="60" fill="#B8860B" rx="9"/>
  <rect x="212" y="270" width="18" height="60" fill="#B8860B" rx="9"/>
  
  <!-- Paws -->
  <ellipse cx="179" cy="335" rx="15" ry="10" fill="#B8860B"/>
  <ellipse cx="221" cy="335" rx="15" ry="10" fill="#B8860B"/>
  
  <!-- Tail (wagging) -->
  <path d="M 250 200 Q 290 160 280 110" stroke="#DAA520" stroke-width="25" fill="none" stroke-linecap="round"/>
  
  <!-- Heart (happiness) -->
  <g transform="translate(260, 80)">
    <path d="M -5,-2 L 0,-5 L 5,-2 Q 5,0 0,4 Q -5,0 -5,-2" fill="#FF1493"/>
  </g>
  
  <!-- Text -->
  <text x="200" y="370" text-anchor="middle" font-size="28" font-weight="bold" fill="#22C55E">ANIMAL TROUVÉ</text>
</svg>