<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="400" fill="#FEF5E7"/>
  
  <!-- Alert badge -->
  <circle cx="340" cy="60" r="40" fill="#DC2626"/>
  <text x="340" y="65" text-anchor="middle" font-size="32" font-weight="bold" fill="white">!</text>
  
  <!-- Phone -->
  <rect x="140" y="100" width="120" height="200" fill="#000" rx="15" stroke="#666" stroke-width="2"/>
  
  <!-- Screen -->
  <rect x="150" y="115" width="100" height="170" fill="#1E40AF" rx="10"/>
  
  <!-- Apps (dots on screen) -->
  <circle cx="170" cy="135" r="8" fill="#60A5FA"/>
  <circle cx="200" cy="135" r="8" fill="#34D399"/>
  <circle cx="230" cy="135" r="8" fill="#FBBF24"/>
  
  <circle cx="170" cy="170" r="8" fill="#A78BFA"/>
  <circle cx="200" cy="170" r="8" fill="#F87171"/>
  <circle cx="230" cy="170" r="8" fill="#FB7185"/>
  
  <!-- Speaker/Notch -->
  <rect x="180" y="118" width="40" height="5" fill="#111" rx="2"/>
  
  <!-- Home button -->
  <circle cx="200" cy="290" r="10" fill="#333"/>
  
  <!-- Cracks (lost indicator) -->
  <line x1="180" y1="140" x2="190" y2="160" stroke="#C0392B" stroke-width="2"/>
  <line x1="210" y1="155" x2="220" y2="175" stroke="#C0392B" stroke-width="2"/>
  
  <!-- Text -->
  <text x="200" y="340" text-anchor="middle" font-size="28" font-weight="bold" fill="#DC2626">OBJET PERDU</text>
</svg>