<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="400" fill="#FEF5E7"/>
  
  <!-- Alert badge -->
  <circle cx="340" cy="60" r="40" fill="#DC2626"/>
  <text x="340" y="65" text-anchor="middle" font-size="32" font-weight="bold" fill="white">!</text>
  
  <!-- Ears -->
  <ellipse cx="160" cy="80" rx="20" ry="35" fill="#8B4513"/>
  <ellipse cx="240" cy="80" rx="20" ry="35" fill="#8B4513"/>
  <ellipse cx="160" cy="90" rx="12" ry="22" fill="#D4A574"/>
  <ellipse cx="240" cy="90" rx="12" ry="22" fill="#D4A574"/>
  
  <!-- Head -->
  <circle cx="200" cy="130" r="55" fill="#A0522D"/>
  
  <!-- Snout -->
  <ellipse cx="200" cy="155" rx="30" ry="35" fill="#8B4513"/>
  
  <!-- Eyes -->
  <circle cx="180" cy="115" r="8" fill="#000"/>
  <circle cx="220" cy="115" r="8" fill="#000"/>
  <circle cx="182" cy="112" r="3" fill="#fff"/>
  <circle cx="222" cy="112" r="3" fill="#fff"/>
  
  <!-- Nose -->
  <ellipse cx="200" cy="160" rx="10" ry="8" fill="#000"/>
  
  <!-- Mouth (sad) -->
  <path d="M 195 170 Q 200 165 205 170" stroke="#000" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Body -->
  <ellipse cx="200" cy="220" rx="50" ry="60" fill="#8B4513"/>
  
  <!-- Front legs -->
  <rect x="170" y="270" width="18" height="60" fill="#654321" rx="9"/>
  <rect x="212" y="270" width="18" height="60" fill="#654321" rx="9"/>
  
  <!-- Paws -->
  <ellipse cx="179" cy="335" rx="15" ry="10" fill="#654321"/>
  <ellipse cx="221" cy="335" rx="15" ry="10" fill="#654321"/>
  
  <!-- Tail -->
  <path d="M 250 200 Q 280 180 270 130" stroke="#8B4513" stroke-width="25" fill="none" stroke-linecap="round"/>
  
  <!-- Text -->
  <text x="200" y="370" text-anchor="middle" font-size="28" font-weight="bold" fill="#DC2626">ANIMAL PERDU</text>
</svg>