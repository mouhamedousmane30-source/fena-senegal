<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="400" fill="#E8F5E9"/>
  
  <!-- Check badge -->
  <circle cx="340" cy="60" r="40" fill="#22C55E"/>
  <text x="345" y="75" text-anchor="middle" font-size="40" font-weight="bold" fill="white">✓</text>
  
  <!-- Head -->
  <circle cx="200" cy="100" r="45" fill="#D4A574"/>
  
  <!-- Smile -->
  <path d="M 185 110 Q 200 120 215 110" stroke="#000" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Body -->
  <rect x="170" y="155" width="60" height="80" fill="#10B981" rx="10"/>
  
  <!-- Arms -->
  <rect x="100" y="170" width="70" height="25" fill="#D4A574" rx="12"/>
  <rect x="230" y="170" width="70" height="25" fill="#D4A574" rx="12"/>
  
  <!-- Legs -->
  <rect x="175" y="240" width="20" height="70" fill="#2C2C2C" rx="10"/>
  <rect x="205" y="240" width="20" height="70" fill="#2C2C2C" rx="10"/>
  
  <!-- Text -->
  <text x="200" y="340" text-anchor="middle" font-size="28" font-weight="bold" fill="#22C55E">PERSONNE TROUVÉE</text>
</svg>